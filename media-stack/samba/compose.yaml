services:
  samba:
    image: dockurr/samba
    container_name: samba
    environment:
      NAME: "Data"
      USER: "$USER"
      PASS: "$PASS"
      UID: 1000
      GUID: 1000
    ports:
      - 445:445
    volumes:
      - /data:/storage # make sure primary user has access by doing 'chown -R 1000:1000 /data'
    restart: always
