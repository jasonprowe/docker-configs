---
services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - ./config:/config
      - /data/media/movies:/movies #optional
      - /data/media/tv/:/tv #optional
    ports:
      - 6767:6767
    restart: unless-stopped
