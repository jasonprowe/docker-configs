services:

  linkstack:
    hostname: 'linkstack'
    image: 'linkstackorg/linkstack:latest'
    environment:
      TZ: 'America/Los_Angeles'
      SERVER_ADMIN: '$SERVER_ADMIN' # This is an email address
      HTTP_SERVER_NAME: 'jasonprowe.com'
      HTTPS_SERVER_NAME: 'jasonprowe.com'
      LOG_LEVEL: 'info'
      PHP_MEMORY_LIMIT: '256M'
      UPLOAD_MAX_FILESIZE: '8M'
    volumes:
      - linkstack_data:/htdocs
    ports:
      - '5553:80'
    restart: unless-stopped

volumes:
  linkstack_data:
