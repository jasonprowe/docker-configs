version: '3.8'
services:
  filebrowser:
    image: filebrowser/filebrowser
    user: "0:0"
    container_name: filebrowser
    ports:
      - "5323:80"
    volumes:
      - /mnt/filebrowser-data:/srv
      - ./config:/config
      - ./database:/database
    environment:
      - FB_BASEURL=/filebrowser
    restart: unless-stopped
