
services:
  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - "./config/:/etc/searxng/"
      - "./data/:/var/cache/searxng/"
    environment:
      - SEARXNG_BASE_URL=https://$SEARXNG_BASE_URL/
